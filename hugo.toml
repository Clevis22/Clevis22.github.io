baseURL = "https://tinyweights.dev"
languageCode = "en-us"
title = "TinyWeights.dev"
theme = "PaperMod"
pagerSize = 10
enableRobotsTXT = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Tiny Weights"
  description = "Small language models — Gemma, Phi, SmolLM, Qwen, and the rest — are getting surprisingly capable. Benchmarks, local deployment, quantization, and hands-on guides for running small LLMs on real hardware."
  keywords = ["small language models", "SLM", "Gemma", "local AI", "edge AI"]
  author = "Clevis"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  UseHugoToc = true

  [params.homeInfoParams]
    Title = "Tiny Weights"
    Content = "Small language models — Gemma, Phi, SmolLM, Qwen, and the rest — are getting surprisingly capable. Benchmarks, local deployment, quantization, and hands-on guides for running small LLMs on real hardware."

  [[params.socialIcons]]
    name = "bluesky"
    url = "https://bsky.app/profile/tinyweights.bsky.social"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 2
    [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  lineNumbersInTable = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

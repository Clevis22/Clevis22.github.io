baseURL = "https://tinyweights.dev"
languageCode = "en-us"
title = "TinyWeights.dev"
theme = "PaperMod"
pagerSize = 10
enableRobotsTXT = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Tiny Weights"
  description = "Small language models — Gemma, Phi, SmolLM, Qwen, and the rest — are getting surprisingly capable. Benchmarks, local deployment, quantization, and hands-on guides for running small LLMs on real hardware."
  keywords = ["small language models", "SLM", "Gemma", "local AI", "edge AI"]
  author = "Clevis"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = true
  UseHugoToc = true
  mainSections = ["posts"]

  [[params.socialIcons]]
    name = "bluesky"
    url = "https://bsky.app/profile/tinyweights.bsky.social"

[menu]
  [[menu.main]]
    name = "/home"
    title = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "/posts"
    title = "Posts"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "/search"
    title = "Search"
    url = "/search/"
    weight = 3
  [[menu.main]]
    name = "/try"
    title = "Try a model in-browser"
    url = "/try/"
    weight = 4
  [[menu.main]]
    name = "/about"
    title = "About"
    url = "/about/"
    weight = 5

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  lineNumbersInTable = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

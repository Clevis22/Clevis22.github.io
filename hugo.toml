baseURL = "https://clevis22.github.io"
languageCode = "en-us"
title = "Tiny Weights"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Tiny Weights"
  description = "A blog about small language models — Gemma, SmolLM, Phi, and the rest of the SLM landscape."
  keywords = ["small language models", "SLM", "Gemma", "local AI", "edge AI"]
  author = "Clevis"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  UseHugoToc = true

  [params.homeInfoParams]
    Title = "Tiny Weights 🤏"
    Content = "A blog about small language models — Gemma, SmolLM, Phi, and everything in the SLM space. Running big ideas on small hardware."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Clevis22"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 2
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]

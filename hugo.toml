baseURL = "https://tinyweights.dev"
locale = "en-us"
title = "TinyWeights.dev"
theme = "PaperMod"
enableRobotsTXT = true

[pagination]
  pagerSize = 10

# Powers the related-posts block on single pages (layouts/_default/single.html).
# threshold is deliberately low: every post shares the site-wide "small-models"
# tag, so ranking (shared-tag count, then recency) does the real work.
[related]
  includeNewer = true
  threshold = 20
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Tiny Weights"
  description = "Small language models like Gemma, Phi, SmolLM, and Qwen, run locally. Benchmarks, quantization, and hands-on deployment guides for small LLMs on real hardware."
  keywords = ["small language models", "SLM", "Gemma", "local AI", "edge AI"]
  author = "Clevis"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = true
  UseHugoToc = true
  mainSections = ["posts"]

  [[params.socialIcons]]
    name = "bluesky"
    url = "https://bsky.app/profile/tinyweights.bsky.social"

[menu]
  [[menu.main]]
    name = "/home"
    title = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "/posts"
    title = "Posts"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "/search"
    title = "Search"
    url = "/search/"
    weight = 3
  [[menu.main]]
    name = "/try"
    title = "Try a model in-browser"
    url = "/try/"
    weight = 4
  [[menu.main]]
    name = "/fit"
    title = "Which model fits your hardware?"
    url = "/fit/"
    weight = 5
  [[menu.main]]
    name = "/models"
    title = "Compare every small model"
    url = "/models/"
    weight = 6
  [[menu.main]]
    name = "/about"
    title = "About"
    url = "/about/"
    weight = 7

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  lineNumbersInTable = false

[outputFormats.llms]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true

[outputs]
  home = ["HTML", "RSS", "JSON", "llms"]

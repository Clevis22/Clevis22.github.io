<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background: deep navy pixel bg -->
  <rect width="64" height="64" fill="#0d0f1a"/>

  <!-- === BODY: chunky orange rounded square === -->
  <!-- Torso -->
  <rect x="22" y="26" width="20" height="18" fill="#f5813f"/>
  <!-- Torso top corners clipped for pixel-round feel -->
  <rect x="22" y="26" width="2" height="2" fill="#0d0f1a"/>
  <rect x="40" y="26" width="2" height="2" fill="#0d0f1a"/>
  <rect x="22" y="42" width="2" height="2" fill="#0d0f1a"/>
  <rect x="40" y="42" width="2" height="2" fill="#0d0f1a"/>
  <!-- Torso highlight left side -->
  <rect x="24" y="28" width="4" height="10" fill="#f99a5e"/>

  <!-- === HEAD === -->
  <rect x="20" y="10" width="24" height="20" fill="#f5813f"/>
  <!-- Head corners -->
  <rect x="20" y="10" width="2" height="2" fill="#0d0f1a"/>
  <rect x="42" y="10" width="2" height="2" fill="#0d0f1a"/>
  <rect x="20" y="28" width="2" height="2" fill="#0d0f1a"/>
  <rect x="42" y="28" width="2" height="2" fill="#0d0f1a"/>
  <!-- Head highlight -->
  <rect x="22" y="12" width="6" height="4" fill="#f99a5e"/>

  <!-- === EYES === -->
  <!-- Left eye white -->
  <rect x="24" y="16" width="6" height="6" fill="#ffffff"/>
  <!-- Left pupil -->
  <rect x="26" y="18" width="2" height="2" fill="#1a0a3a"/>
  <!-- Left eye shine -->
  <rect x="24" y="16" width="2" height="2" fill="#ffffff"/>

  <!-- Right eye white -->
  <rect x="34" y="16" width="6" height="6" fill="#ffffff"/>
  <!-- Right pupil -->
  <rect x="36" y="18" width="2" height="2" fill="#1a0a3a"/>
  <!-- Right eye shine -->
  <rect x="34" y="16" width="2" height="2" fill="#ffffff"/>

  <!-- === MOUTH: happy pixel grin === -->
  <rect x="26" y="24" width="2" height="2" fill="#1a0a3a"/>
  <rect x="28" y="26" width="2" height="2" fill="#1a0a3a"/>
  <rect x="30" y="26" width="4" height="2" fill="#1a0a3a"/>
  <rect x="34" y="26" width="2" height="2" fill="#1a0a3a"/>
  <rect x="36" y="24" width="2" height="2" fill="#1a0a3a"/>
  <!-- Teeth -->
  <rect x="28" y="24" width="2" height="2" fill="#ffffff"/>
  <rect x="30" y="24" width="2" height="2" fill="#ffffff"/>
  <rect x="32" y="24" width="2" height="2" fill="#ffffff"/>
  <rect x="34" y="24" width="2" height="2" fill="#ffffff"/>

  <!-- Outline separation mouth from chin -->
  <rect x="26" y="28" width="12" height="2" fill="#c45e20"/>

  <!-- === EARS / SIDE BLOBS === -->
  <rect x="18" y="14" width="4" height="8" fill="#f5813f"/>
  <rect x="18" y="14" width="2" height="2" fill="#0d0f1a"/>
  <rect x="18" y="20" width="2" height="2" fill="#0d0f1a"/>
  <rect x="42" y="14" width="4" height="8" fill="#f5813f"/>
  <rect x="44" y="14" width="2" height="2" fill="#0d0f1a"/>
  <rect x="44" y="20" width="2" height="2" fill="#0d0f1a"/>

  <!-- === ARMS holding barbell === -->
  <!-- Left arm -->
  <rect x="14" y="28" width="8" height="6" fill="#f5813f"/>
  <rect x="14" y="28" width="2" height="2" fill="#0d0f1a"/>
  <rect x="14" y="32" width="2" height="2" fill="#0d0f1a"/>
  <!-- Right arm -->
  <rect x="42" y="28" width="8" height="6" fill="#f5813f"/>
  <rect x="48" y="28" width="2" height="2" fill="#0d0f1a"/>
  <rect x="48" y="32" width="2" height="2" fill="#0d0f1a"/>

  <!-- === BARBELL === -->
  <!-- Left weight plate (big) -->
  <rect x="4" y="24" width="6" height="16" fill="#5b6af0"/>
  <rect x="4" y="24" width="2" height="2" fill="#0d0f1a"/>
  <rect x="8" y="24" width="2" height="2" fill="#0d0f1a"/>
  <rect x="4" y="38" width="2" height="2" fill="#0d0f1a"/>
  <rect x="8" y="38" width="2" height="2" fill="#0d0f1a"/>
  <!-- Left weight highlight -->
  <rect x="4" y="26" width="2" height="8" fill="#8899ff"/>

  <!-- Right weight plate (big) -->
  <rect x="54" y="24" width="6" height="16" fill="#5b6af0"/>
  <rect x="54" y="24" width="2" height="2" fill="#0d0f1a"/>
  <rect x="58" y="24" width="2" height="2" fill="#0d0f1a"/>
  <rect x="54" y="38" width="2" height="2" fill="#0d0f1a"/>
  <rect x="58" y="38" width="2" height="2" fill="#0d0f1a"/>
  <!-- Right weight highlight -->
  <rect x="56" y="26" width="2" height="8" fill="#8899ff"/>

  <!-- Barbell rod -->
  <rect x="10" y="30" width="44" height="4" fill="#c8cfe8"/>
  <rect x="10" y="30" width="44" height="2" fill="#e8ecff"/>

  <!-- Collar clips -->
  <rect x="10" y="28" width="4" height="8" fill="#f5c842"/>
  <rect x="10" y="28" width="2" height="2" fill="#0d0f1a"/>
  <rect x="12" y="28" width="2" height="2" fill="#0d0f1a"/>
  <rect x="10" y="34" width="2" height="2" fill="#0d0f1a"/>

  <rect x="50" y="28" width="4" height="8" fill="#f5c842"/>
  <rect x="52" y="28" width="2" height="2" fill="#0d0f1a"/>
  <rect x="52" y="34" width="2" height="2" fill="#0d0f1a"/>

  <!-- === LEGS === -->
  <rect x="24" y="44" width="6" height="8" fill="#f5813f"/>
  <rect x="34" y="44" width="6" height="8" fill="#f5813f"/>
  <!-- Feet -->
  <rect x="22" y="50" width="10" height="4" fill="#1a0a3a"/>
  <rect x="32" y="50" width="10" height="4" fill="#1a0a3a"/>
  <!-- Foot highlights -->
  <rect x="22" y="50" width="4" height="2" fill="#2e2060"/>
  <rect x="32" y="50" width="4" height="2" fill="#2e2060"/>

  <!-- === SWEAT DROP (effort!) === -->
  <rect x="44" y="10" width="2" height="4" fill="#5bbfff"/>
  <rect x="42" y="12" width="2" height="4" fill="#5bbfff"/>
  <rect x="44" y="14" width="2" height="2" fill="#5bbfff"/>

  <!-- === PIXEL STARS / sparkle top === -->
  <rect x="8" y="6" width="2" height="2" fill="#f5c842"/>
  <rect x="54" y="8" width="2" height="2" fill="#f5c842"/>
  <rect x="12" y="4" width="2" height="2" fill="#ffffff"/>
  <rect x="50" y="4" width="2" height="2" fill="#ffffff"/>

</svg>

name: Deploy Hugo
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true
      - run: hugo --minify
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

  # Announce newly added posts on Bluesky once the deploy is out.
  # Idempotent: the script checks the author feed before posting, so
  # re-pushes and force-pushes never double-post.
  announce:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Find posts added by this push
        id: newposts
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            BEFORE="$(git rev-parse HEAD^)"
          fi
          FILES="$(git diff --name-only --diff-filter=A "$BEFORE" "${{ github.sha }}" -- 'content/posts/*.md' | tr '\n' ' ')"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "new posts: ${FILES:-none}"
      - name: Post to Bluesky
        if: steps.newposts.outputs.files != ''
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python3 .github/scripts/bluesky_post.py ${{ steps.newposts.outputs.files }}
